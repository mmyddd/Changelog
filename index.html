<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTNH 更新日志配置工具</title>
    <!-- 主要使用 Cloudflare CDN，备用使用 cdnjs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <!-- 如果上面失败，下面这行会尝试加载（但浏览器通常会缓存，为防止阻塞可以加一个fallback检查） -->
    <script>window.Sortable || document.write('<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"><\/script>');</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #1a1e2b;
            color: #e0e0e0;
            padding: 24px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 2px solid #2d3349;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffaa00, #ff5555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            background: #2d3349;
            color: #e0e0e0;
            border: 1px solid #404760;
        }

        .btn-primary {
            background: #ffaa00;
            color: #1a1e2b;
            border: none;
        }

        .btn-primary:hover {
            background: #ffbb22;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 170, 0, 0.2);
        }

        .btn-danger {
            background: #ff5555;
            color: white;
            border: none;
        }

        .btn-danger:hover {
            background: #ff7777;
        }

        .btn:hover {
            background: #404760;
        }

        /* 目录导航 */
        .table-of-contents {
            background: #232838;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid #404760;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .toc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            cursor: pointer;
            background: #2d3349;
            user-select: none;
        }

        .toc-header:hover {
            background: #353d55;
        }

        .toc-header h2 {
            font-size: 18px;
            color: #ffaa00;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toc-toggle {
            font-size: 20px;
            color: #ffaa00;
            transition: transform 0.3s ease;
        }

        .toc-toggle.expanded {
            transform: rotate(180deg);
        }

        .toc-content {
            max-height: 500px;
            overflow-y: auto;
            transition: max-height 0.3s ease;
            padding: 16px 24px;
            background: #1a1e2b;
        }

        .toc-content.collapsed {
            max-height: 0;
            padding: 0 24px;
        }

        .toc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .toc-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #232838;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #404760;
        }

        .toc-item:hover {
            background: #2d3349;
            transform: translateX(4px);
            border-color: #ffaa00;
        }

        .toc-version {
            font-weight: 600;
            color: #ffaa00;
            min-width: 70px;
        }

        .toc-title {
            font-size: 13px;
            color: #a0a0a0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .toc-type-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
            background: #1a1e2b;
            color: #a0a0a0;
        }

        /* 标签页 */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: #232838;
            padding: 4px;
            border-radius: 12px;
            width: fit-content;
        }

        .tab {
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            color: #a0a0a0;
        }

        .tab.active {
            background: #ffaa00;
            color: #1a1e2b;
        }

        .content {
            display: flex;
            gap: 24px;
        }

        .editor-panel {
            flex: 2;
            background: #232838;
            border-radius: 16px;
            padding: 24px;
            overflow-y: auto;
            max-height: calc(100vh - 300px);
            border: 1px solid #404760;
        }

        .preview-panel {
            flex: 1;
            background: #232838;
            border-radius: 16px;
            padding: 24px;
            position: sticky;
            top: 24px;
            height: fit-content;
            max-height: calc(100vh - 300px);
            overflow-y: auto;
            border: 1px solid #404760;
        }

        .preview-panel h3 {
            margin-bottom: 16px;
            color: #ffaa00;
            font-size: 18px;
        }

        .preview-content {
            background: #1a1e2b;
            border-radius: 12px;
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid #404760;
            line-height: 1.4;
        }

        /* 表单样式 */
        .form-section {
            margin-bottom: 32px;
            border-bottom: 1px solid #404760;
            padding-bottom: 24px;
        }

        .form-section h2 {
            font-size: 18px;
            color: #ffaa00;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #a0a0a0;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            background: #1a1e2b;
            border: 1px solid #404760;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .form-control:focus {
            outline: none;
            border-color: #ffaa00;
        }

        textarea.form-control {
            min-height: 100px;
            font-family: 'Fira Code', monospace;
            resize: vertical;
        }

        .entries-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .entry-card {
            background: #1a1e2b;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #404760;
            scroll-margin-top: 20px;
        }

        .entry-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .entry-card-header h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }

        .entry-version {
            background: #ffaa00;
            color: #1a1e2b;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .entry-type {
            background: #2d3349;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .entry-actions {
            display: flex;
            gap: 8px;
        }

        .entry-action-btn {
            background: none;
            border: none;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }

        .entry-action-btn:hover {
            color: #ffaa00;
        }

        .entry-action-btn.delete:hover {
            color: #ff5555;
        }

        /* 类型复选框组 (椭圆样式) */
        .type-checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 8px 0;
        }

        .type-checkbox-item {
            display: flex;
            align-items: center;
        }

        .type-checkbox-item input[type="checkbox"] {
            display: none;
        }

        .type-checkbox-item label {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            background: #2d3349;
            color: #a0a0a0;
        }

        .type-checkbox-item input[type="checkbox"]:checked + label {
            background: #ffaa00;
            color: #1a1e2b;
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
        }

        /* 每种类型的特殊颜色 (未选中时半透明，选中时纯色) */
        .type-major label { background: #5555FF20; color: #aaaaff; }
        .type-major input[type="checkbox"]:checked + label { background: #5555FF; color: white; }

        .type-minor label { background: #55FF5520; color: #aaffaa; }
        .type-minor input[type="checkbox"]:checked + label { background: #55FF55; color: #1a1e2b; }

        .type-patch label { background: #FFFF5520; color: #ffffaa; }
        .type-patch input[type="checkbox"]:checked + label { background: #FFFF55; color: #1a1e2b; }

        .type-hotfix label { background: #FF555520; color: #ffaaaa; }
        .type-hotfix input[type="checkbox"]:checked + label { background: #FF5555; color: white; }

        .type-danger label { background: #FF555520; color: #ffaaaa; }
        .type-danger input[type="checkbox"]:checked + label { background: #FF0000; color: white; }

        /* 标签容器 */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
            min-height: 30px;
        }

        .tag {
            color: #ffffff; /* 白色文字保证可读性 */
            padding: 4px 10px 4px 6px;
            border-radius: 16px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 1px solid rgba(0,0,0,0.2);
            user-select: none;
        }

        .drag-handle {
            cursor: grab;
            opacity: 0.7;
            font-size: 14px;
            margin-right: 2px;
            user-select: none;
        }
        .drag-handle:hover {
            opacity: 1;
        }
        .tag-name {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .remove-tag {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 12px;
            padding: 0 2px;
        }
        .remove-tag:hover {
            color: #ffffff;
        }

        /* 变更列表 */
        .changes-list {
            list-style: none;
            margin: 12px 0;
        }

        .change-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #2d3349;
            background: #1a1e2b;
        }

        .change-item .drag-handle {
            cursor: grab;
            opacity: 0.5;
            font-size: 16px;
            margin-left: 4px;
        }
        .change-item .drag-handle:hover {
            opacity: 1;
        }

        .change-item input {
            flex: 1;
            background: #232838;
            border: 1px solid #404760;
            border-radius: 4px;
            padding: 6px 8px;
            color: #e0e0e0;
            font-size: 13px;
        }

        .change-item button {
            background: none;
            border: none;
            color: #ff5555;
            cursor: pointer;
            font-size: 14px;
            margin-right: 4px;
        }

        .add-change-btn {
            background: none;
            border: 1px dashed #404760;
            color: #a0a0a0;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
        }

        .add-change-btn:hover {
            border-color: #ffaa00;
            color: #ffaa00;
        }

        .color-input-group {
            display: flex;
            gap: 8px;
        }

        .color-input-group input[type="color"] {
            width: 50px;
            height: 38px;
            padding: 4px;
            background: #1a1e2b;
            border: 1px solid #404760;
            border-radius: 8px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: #2d3349;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            border-left: 4px solid #ffaa00;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 CTNH 更新日志配置工具</h1>
            <div class="header-actions">
                <button class="btn" onclick="importJson()">📂 导入 JSON</button>
                <button class="btn btn-primary" onclick="exportJson()">💾 导出 JSON</button>
                <button class="btn btn-danger" onclick="resetToDefault()">↺ 重置</button>
            </div>
        </div>

        <!-- 目录导航 -->
        <div class="table-of-contents" id="tableOfContents">
            <div class="toc-header" onclick="toggleToc()">
                <h2>📑 版本目录 <span id="tocCount">(0 个版本)</span></h2>
                <span class="toc-toggle expanded" id="tocToggle">▼</span>
            </div>
            <div class="toc-content expanded" id="tocContent">
                <div class="toc-grid" id="tocGrid"></div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('entries')">📋 更新条目</div>
            <div class="tab" onclick="switchTab('tags')">🏷️ 标签颜色</div>
            <div class="tab" onclick="switchTab('footer')">📌 脚注</div>
        </div>

        <div class="content">
            <div class="editor-panel" id="editorPanel">
                <div id="entriesTab" style="display: block;">
                    <div class="form-section">
                        <h2>📦 更新日志条目</h2>
                        <button class="btn" onclick="addEntry()" style="margin-bottom: 16px;">➕ 新增条目</button>
                        <div id="entriesContainer" class="entries-list"></div>
                    </div>
                </div>
                <div id="tagsTab" style="display: none;">
                    <div class="form-section">
                        <h2>🏷️ 标签颜色配置</h2>
                        <div class="form-group">
                            <label>标签颜色映射 (格式: 0xFFRRGGBB)</label>
                            <div id="tagColorsContainer" style="display: flex; flex-direction: column; gap: 12px;"></div>
                            <button class="btn" onclick="addTagColor()" style="margin-top: 16px;">➕ 添加标签</button>
                        </div>
                    </div>
                </div>
                <div id="footerTab" style="display: none;">
                    <div class="form-section">
                        <h2>📌 脚注配置</h2>
                        <div class="form-group">
                            <label>脚注文本</label>
                            <input type="text" class="form-control" id="footerText" value="Example" placeholder="输入脚注文本...">
                        </div>
                    </div>
                </div>
            </div>

            <div class="preview-panel">
                <h3>📄 JSON 预览</h3>
                <div class="preview-content" id="jsonPreview"></div>
            </div>
        </div>
    </div>

    <script>
        const TYPE_OPTIONS = ['major', 'minor', 'patch', 'hotfix', 'danger'];
        const TYPE_DISPLAY_NAMES = {
            'major': '重大更新',
            'minor': '功能更新',
            'patch': '修复补丁',
            'hotfix': '热修复',
            'danger': '危险更新'
        };

        const defaultData = {
            footer: "Example",
            entries: [
                {
                    version: "1.0.0",
                    date: "2026-02-12",
                    title: "Example",
                    type: ["major", "minor", "patch", "hotfix", "danger"],
                    tags: ["Example", "Example"],
                    color: "0xFFFFFF00",
                    changes: ["Example", "Example"]
                },
                {
                    version: "2.0.0",
                    date: "2026-02-12",
                    title: "Example",
                    type: ["major", "minor", "patch", "hotfix", "danger"],
                    tags: ["Example", "Example"],
                    color: "0x0000FF00",
                    changes: ["Example", "Example"]
                }
            ],
            tagColors: {
                "Example": "0xFF5555FF" // 修改为 0x 格式 (蓝色)
            }
        };

        let currentData = JSON.parse(JSON.stringify(defaultData));
        let currentTab = 'entries';
        let isTocExpanded = true;
        let sortableInstances = [];

        // 等待 Sortable 加载完成（最多尝试 20 次，间隔 100ms）
        function waitForSortable(callback, maxAttempts = 20) {
            let attempts = 0;
            function check() {
                if (typeof Sortable !== 'undefined') {
                    callback();
                } else if (attempts < maxAttempts) {
                    attempts++;
                    setTimeout(check, 100);
                } else {
                    console.error('Sortable library failed to load. Drag and drop will not work.');
                    showToast('拖拽库加载失败，请刷新页面重试', 'error');
                }
            }
            check();
        }

        function init() {
            renderEntries();
            renderTagColors();
            renderToc();
            document.getElementById('footerText').value = currentData.footer;
            updatePreview();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById('entriesTab').style.display = tab === 'entries' ? 'block' : 'none';
            document.getElementById('tagsTab').style.display = tab === 'tags' ? 'block' : 'none';
            document.getElementById('footerTab').style.display = tab === 'footer' ? 'block' : 'none';
        }

        function renderToc() {
            const tocGrid = document.getElementById('tocGrid');
            const tocCount = document.getElementById('tocCount');
            tocCount.textContent = `(${currentData.entries.length} 个版本)`;
            if (currentData.entries.length === 0) {
                tocGrid.innerHTML = '<div style="color: #a0a0a0; text-align: center; padding: 20px;">暂无版本</div>';
                return;
            }
            tocGrid.innerHTML = currentData.entries.map((entry, index) => {
                const typeText = entry.type.map(t => TYPE_DISPLAY_NAMES[t] || t).join('/');
                return `
                    <div class="toc-item" onclick="navigateToVersion(${index})">
                        <span class="toc-version" style="color: ${hexToRgba(entry.color)}">${entry.version}</span>
                        <span class="toc-title">${entry.title || '无标题'}</span>
                        <span class="toc-type-badge">${typeText}</span>
                    </div>
                `;
            }).join('');
        }

        function toggleToc() {
            const tocContent = document.getElementById('tocContent');
            const tocToggle = document.getElementById('tocToggle');
            isTocExpanded = !isTocExpanded;
            if (isTocExpanded) {
                tocContent.classList.remove('collapsed');
                tocToggle.classList.add('expanded');
            } else {
                tocContent.classList.add('collapsed');
                tocToggle.classList.remove('expanded');
            }
        }

        function navigateToVersion(index) {
            const entries = document.querySelectorAll('.entry-card');
            if (entries[index]) {
                entries[index].scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function initDragSort() {
            // 确保 Sortable 可用
            if (typeof Sortable === 'undefined') {
                console.warn('Sortable not available, skipping drag init');
                return;
            }
            // 销毁旧实例
            sortableInstances.forEach(instance => instance.destroy());
            sortableInstances = [];

            document.querySelectorAll('[id^="tags-"]').forEach(container => {
                if (container.children.length === 0) return;
                const sortable = new Sortable(container, {
                    handle: '.drag-handle',
                    animation: 150,
                    onEnd: function(evt) {
                        const id = evt.target.id;
                        const index = parseInt(id.split('-')[1]);
                        const newTags = [];
                        container.querySelectorAll('.tag').forEach(tagEl => {
                            const nameSpan = tagEl.querySelector('.tag-name');
                            if (nameSpan) newTags.push(nameSpan.textContent);
                        });
                        currentData.entries[index].tags = newTags;
                        updatePreview();
                    }
                });
                sortableInstances.push(sortable);
            });

            document.querySelectorAll('[id^="changes-"]').forEach(container => {
                if (container.children.length === 0) return;
                const sortable = new Sortable(container, {
                    handle: '.drag-handle',
                    animation: 150,
                    onEnd: function(evt) {
                        const id = evt.target.id;
                        const index = parseInt(id.split('-')[1]);
                        const newChanges = [];
                        container.querySelectorAll('.change-item').forEach(item => {
                            const input = item.querySelector('input');
                            if (input) newChanges.push(input.value);
                        });
                        currentData.entries[index].changes = newChanges;
                        updatePreview();
                    }
                });
                sortableInstances.push(sortable);
            });
        }

        function renderEntries() {
            const container = document.getElementById('entriesContainer');
            container.innerHTML = '';
            currentData.entries.forEach((entry, index) => {
                const entryDiv = document.createElement('div');
                entryDiv.className = 'entry-card';
                entryDiv.id = `entry-${index}`;
                // 生成标签HTML，每个标签使用对应颜色背景
                const tagsHtml = entry.tags.map(tag => {
                    // 获取标签颜色，如果未定义则使用默认灰色 0xFF888888
                    let tagColor = currentData.tagColors[tag] || '0xFF888888';
                    // 转换为 #RRGGBB 用于 CSS 背景
                    const bgColor = hexToRgba(tagColor); // 该函数已支持 0x 转 #
                    return `
                        <span class="tag" style="background: ${bgColor}">
                            <span class="drag-handle">☰</span>
                            <span class="tag-name">${tag}</span>
                            <button class="remove-tag" onclick="removeTagFromEntry(${index}, '${tag}')">✕</button>
                        </span>
                    `;
                }).join('');

                entryDiv.innerHTML = `
                    <div class="entry-card-header">
                        <h3>
                            <span class="entry-version" style="background: ${hexToRgba(entry.color)}">${entry.version}</span>
                            <span class="entry-type">${entry.type.map(t => TYPE_DISPLAY_NAMES[t] || t).join(', ')}</span>
                        </h3>
                        <div class="entry-actions">
                            <button class="entry-action-btn" onclick="moveEntry(${index}, 'up')" ${index === 0 ? 'disabled' : ''}>⬆️</button>
                            <button class="entry-action-btn" onclick="moveEntry(${index}, 'down')" ${index === currentData.entries.length - 1 ? 'disabled' : ''}>⬇️</button>
                            <button class="entry-action-btn delete" onclick="deleteEntry(${index})">🗑️</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>版本号</label>
                        <input type="text" class="form-control" value="${entry.version}" onchange="updateEntry(${index}, 'version', this.value)">
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>日期</label>
                            <input type="date" class="form-control" value="${entry.date}" onchange="updateEntry(${index}, 'date', this.value)">
                        </div>
                        <div class="form-group">
                            <label>标题</label>
                            <input type="text" class="form-control" value="${entry.title}" onchange="updateEntry(${index}, 'title', this.value)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>类型 (可多选)</label>
                        <div class="type-checkbox-group" id="type-group-${index}">
                            ${TYPE_OPTIONS.map(type => `
                                <div class="type-checkbox-item type-${type}">
                                    <input type="checkbox" 
                                        id="type-${index}-${type}" 
                                        value="${type}"
                                        ${entry.type.includes(type) ? 'checked' : ''}
                                        onchange="updateEntryTypes(${index}, '${type}', this.checked)">
                                    <label for="type-${index}-${type}">${TYPE_DISPLAY_NAMES[type]}</label>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="form-group">
                        <label>颜色</label>
                        <div class="color-input-group">
                            <input type="color" value="${argbToHex(entry.color)}" onchange="updateEntryColor(${index}, this.value)">
                            <input type="text" class="form-control" value="${entry.color}" onchange="updateEntry(${index}, 'color', this.value)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>标签</label>
                        <div class="tags-container" id="tags-${index}">
                            ${tagsHtml}
                        </div>
                        <div style="display: flex; gap: 8px; margin-top: 8px;">
                            <input type="text" class="form-control" id="newTag-${index}" placeholder="新标签" style="width: 200px;">
                            <button class="btn" onclick="addTagToEntry(${index})">添加</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>变更内容</label>
                        <div class="changes-list" id="changes-${index}">
                            ${entry.changes.map((change, changeIndex) => `
                                <div class="change-item">
                                    <span class="drag-handle">☰</span>
                                    <input type="text" value="${change.replace(/"/g, '&quot;')}" onchange="updateChange(${index}, ${changeIndex}, this.value)">
                                    <button onclick="deleteChange(${index}, ${changeIndex})">✕</button>
                                </div>
                            `).join('')}
                        </div>
                        <button class="add-change-btn" onclick="addChange(${index})">+ 添加变更</button>
                    </div>
                `;
                container.appendChild(entryDiv);
            });
            // 等待 Sortable 可用后初始化拖拽
            waitForSortable(initDragSort);
            renderToc();
        }

        function renderTagColors() {
            const container = document.getElementById('tagColorsContainer');
            container.innerHTML = '';
            Object.entries(currentData.tagColors).forEach(([tag, color]) => {
                // 确保 color 是 0x 格式（如果是 # 开头则转换）
                let displayColor = color;
                if (color.startsWith('#')) {
                    // 将 #RRGGBB 转为 0xFFRRGGBB
                    displayColor = '0xFF' + color.substring(1);
                }
                // 对于显示，我们希望文本框显示 0x 格式，颜色选择器使用 # 格式
                const hexColor = argbToHex(displayColor); // 转为 #RRGGBB 供颜色选择器使用
                const row = document.createElement('div');
                row.style.display = 'flex';
                row.style.gap = '8px';
                row.style.alignItems = 'center';
                row.innerHTML = `
                    <input type="text" class="form-control" value="${tag}" placeholder="标签名" style="flex: 2;" onchange="updateTagName('${tag}', this.value)">
                    <div class="color-input-group" style="flex: 2;">
                        <input type="color" value="${hexColor}" onchange="updateTagColor('${tag}', this.value, true)">
                        <input type="text" class="form-control" value="${displayColor}" onchange="updateTagColor('${tag}', this.value, false)">
                    </div>
                    <button class="entry-action-btn delete" onclick="deleteTagColor('${tag}')">🗑️</button>
                `;
                container.appendChild(row);
            });
        }

        function addEntry() {
            const newEntry = {
                version: "1.0.0",
                date: new Date().toISOString().split('T')[0],
                title: "Example",
                type: ["patch"],
                tags: ["Example"],
                color: "0xFFFFFF00",
                changes: ["Example"]
            };
            currentData.entries.unshift(newEntry);
            renderEntries();
            updatePreview();
            showToast('新增条目成功');
            setTimeout(() => navigateToVersion(0), 100);
        }

        function deleteEntry(index) {
            if (confirm('确定要删除这条更新日志吗？')) {
                currentData.entries.splice(index, 1);
                renderEntries();
                updatePreview();
                showToast('条目已删除');
            }
        }

        function moveEntry(index, direction) {
            if (direction === 'up' && index > 0) {
                [currentData.entries[index - 1], currentData.entries[index]] = [currentData.entries[index], currentData.entries[index - 1]];
            } else if (direction === 'down' && index < currentData.entries.length - 1) {
                [currentData.entries[index], currentData.entries[index + 1]] = [currentData.entries[index + 1], currentData.entries[index]];
            }
            renderEntries();
            updatePreview();
        }

        function updateEntry(index, field, value) {
            currentData.entries[index][field] = value;
            updatePreview();
            renderToc();
        }

        function updateEntryTypes(index, type, checked) {
            const entry = currentData.entries[index];
            if (checked) {
                if (!entry.type.includes(type)) entry.type.push(type);
            } else {
                entry.type = entry.type.filter(t => t !== type);
            }
            renderEntries(); // 重新渲染以更新类型标签显示
            updatePreview();
        }

        function updateEntryColor(index, hexColor) {
            // hexColor 是 #RRGGBB 格式，转换为 0xFFRRGGBB
            const rgb = hexColor.replace('#', '');
            currentData.entries[index].color = `0xFF${rgb}`;
            renderEntries();
            updatePreview();
        }

        function addTagToEntry(entryIndex) {
            const input = document.getElementById(`newTag-${entryIndex}`);
            const newTag = input.value.trim();
            if (newTag) {
                currentData.entries[entryIndex].tags.push(newTag);
                renderEntries();
                updatePreview();
                input.value = '';
            }
        }

        function removeTagFromEntry(entryIndex, tag) {
            currentData.entries[entryIndex].tags = currentData.entries[entryIndex].tags.filter(t => t !== tag);
            renderEntries();
            updatePreview();
        }

        function addChange(entryIndex) {
            currentData.entries[entryIndex].changes.push("Example");
            renderEntries();
            updatePreview();
        }

        function updateChange(entryIndex, changeIndex, value) {
            currentData.entries[entryIndex].changes[changeIndex] = value;
            updatePreview();
        }

        function deleteChange(entryIndex, changeIndex) {
            currentData.entries[entryIndex].changes.splice(changeIndex, 1);
            renderEntries();
            updatePreview();
        }

        function addTagColor() {
            const newTag = `新标签${Object.keys(currentData.tagColors).length + 1}`;
            currentData.tagColors[newTag] = "0xFF888888"; // 默认灰色
            renderTagColors();
            updatePreview();
        }

        function updateTagName(oldTag, newTag) {
            if (oldTag !== newTag && newTag.trim()) {
                currentData.tagColors[newTag.trim()] = currentData.tagColors[oldTag];
                delete currentData.tagColors[oldTag];
                renderTagColors();
                renderEntries();
                updatePreview();
            }
        }

        function updateTagColor(tag, color, isHexInput) {
            // isHexInput true 表示来自颜色选择器，传入的是 #RRGGBB
            // false 表示来自文本框，传入的可能已经是 0x 格式，也可能是 # 格式
            let newColor;
            if (isHexInput) {
                // #RRGGBB -> 0xFFRRGGBB
                newColor = '0xFF' + color.substring(1);
            } else {
                // 文本框输入，可能是 0x 或 # 格式，统一转为 0x
                if (color.startsWith('#')) {
                    newColor = '0xFF' + color.substring(1);
                } else if (color.startsWith('0x')) {
                    newColor = color; // 保持原样
                } else {
                    // 未知格式，尝试作为数字？直接保存但可能无效，我们默认加上 0xFF
                    newColor = '0xFF' + color.replace(/^#/, '');
                }
            }
            currentData.tagColors[tag] = newColor;
            renderTagColors();
            renderEntries();
            updatePreview();
        }

        function deleteTagColor(tag) {
            if (confirm(`确定要删除标签 "${tag}" 吗？`)) {
                delete currentData.tagColors[tag];
                renderTagColors();
                renderEntries();
                updatePreview();
                showToast('标签已删除');
            }
        }

        document.getElementById('footerText').addEventListener('input', function(e) {
            currentData.footer = e.target.value;
            updatePreview();
        });

        // 辅助函数：将 0xFFRRGGBB 或 #RRGGBB 转换为 #RRGGBB 供颜色选择器使用
        function argbToHex(argb) {
            if (argb && argb.startsWith('0x')) {
                // 0xFFRRGGBB -> #RRGGBB
                return '#' + argb.substring(4);
            }
            if (argb && argb.startsWith('#')) {
                return argb; // 已经是 # 格式
            }
            return '#FFFF00'; // 默认
        }

        // 辅助函数：将 0x 或 # 格式转为 #RRGGBB 用于 CSS 背景
        function hexToRgba(hex) {
            if (hex && hex.startsWith('0x')) {
                return '#' + hex.substring(4);
            }
            if (hex && hex.startsWith('#')) {
                return hex;
            }
            return '#888888';
        }

        function updatePreview() {
            document.getElementById('jsonPreview').textContent = JSON.stringify(currentData, null, 2);
        }

        function exportJson() {
            const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'changelog.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('导出成功！');
        }

        function importJson() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (imported.footer !== undefined && imported.entries) {
                            currentData = imported;
                            // 确保 tagColors 存在，并统一格式为 0x
                            if (!currentData.tagColors) currentData.tagColors = {};
                            // 将可能存在的 # 格式转换为 0x 格式
                            Object.keys(currentData.tagColors).forEach(tag => {
                                const col = currentData.tagColors[tag];
                                if (typeof col === 'string' && col.startsWith('#')) {
                                    currentData.tagColors[tag] = '0xFF' + col.substring(1);
                                }
                            });
                            renderEntries();
                            renderTagColors();
                            renderToc();
                            document.getElementById('footerText').value = currentData.footer;
                            updatePreview();
                            showToast('导入成功！');
                        } else showToast('无效的 JSON 格式', 'error');
                    } catch { showToast('JSON 解析失败', 'error'); }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function resetToDefault() {
            if (confirm('确定要重置所有数据吗？')) {
                currentData = JSON.parse(JSON.stringify(defaultData));
                renderEntries();
                renderTagColors();
                renderToc();
                document.getElementById('footerText').value = currentData.footer;
                updatePreview();
                showToast('已重置为默认数据');
            }
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'success' ? '#ffaa00' : '#ff5555';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 启动初始化
        init();
    </script>
</body>
</html>
